<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fear & Greed Index</title>
<style>
  :root {
    --bg: #ffffff;
    --card: #f4f4f5;
    --text: #18181b;
    --sub: #71717a;
    --border: #e4e4e7;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1a;
      --card: #27272a;
      --text: #fafafa;
      --sub: #a1a1aa;
      --border: #3f3f46;
    }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 16px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 24px 20px;
    width: 220px;
    position: relative;
  }

  .top-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .header {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--sub);
  }

  .link-btn {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--border);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    transition: background 0.15s;
    flex-shrink: 0;
  }

  .link-btn:hover { background: var(--sub); }

  .link-btn svg {
    width: 11px;
    height: 11px;
    fill: none;
    stroke: var(--sub);
    stroke-width: 2.4;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: stroke 0.15s;
  }

  .link-btn:hover svg { stroke: var(--bg); }

  .gauge-wrap {
    position: relative;
    width: 160px;
    height: 88px;
    margin: 0 auto 4px;
  }

  canvas#gauge {
    width: 160px;
    height: 88px;
  }

  .score-label {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    white-space: nowrap;
  }

  .score-num {
    font-size: 30px;
    font-weight: 800;
    line-height: 1;
  }

  .score-tag {
    font-size: 11px;
    font-weight: 600;
    margin-top: 3px;
  }

  .error-msg {
    color: var(--sub);
    font-size: 12px;
    padding: 16px 0;
    text-align: center;
  }
</style>
</head>
<body>
<div class="card">
  <div class="top-row">
    <div class="header">Fear &amp; Greed Index</div>
    <a class="link-btn" href="https://edition.cnn.com/markets/fear-and-greed" target="_blank" title="CNN Fear & Greed">
      <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </a>
  </div>
  <div id="content">
    <div class="error-msg">Loading...</div>
  </div>
</div>

<script>
const CNN_URL = 'https://production.dataviz.cnn.io/index/fearandgreed/graphdata';
const PROXY   = 'https://corsproxy.io/?' + encodeURIComponent(CNN_URL);

function getColorAndLabel(score) {
  if (score <= 25) return { color: '#ef4444', label: 'Extreme Fear' };
  if (score <= 44) return { color: '#f97316', label: 'Fear' };
  if (score <= 55) return { color: '#eab308', label: 'Neutral' };
  if (score <= 75) return { color: '#84cc16', label: 'Greed' };
  return { color: '#22c55e', label: 'Extreme Greed' };
}

function drawGauge(value, color) {
  const canvas = document.getElementById('gauge');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = 160 * dpr;
  canvas.height = 88 * dpr;
  ctx.scale(dpr, dpr);

  const cx = 80, cy = 80, r = 64, lw = 15;
  const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

  ctx.beginPath();
  ctx.arc(cx, cy, r, Math.PI, 2 * Math.PI);
  ctx.strokeStyle = isDark ? '#3f3f46' : '#e4e4e7';
  ctx.lineWidth = lw;
  ctx.lineCap = 'round';
  ctx.stroke();

  const valueAngle = Math.PI + (value / 100) * Math.PI;
  ctx.beginPath();
  ctx.arc(cx, cy, r, Math.PI, valueAngle);
  ctx.strokeStyle = color;
  ctx.lineWidth = lw;
  ctx.lineCap = 'round';
  ctx.stroke();

  const nx = cx + r * Math.cos(valueAngle);
  const ny = cy + r * Math.sin(valueAngle);
  ctx.beginPath();
  ctx.arc(nx, ny, lw / 2 - 2, 0, 2 * Math.PI);
  ctx.fillStyle = color;
  ctx.fill();
}

async function fetchData(url) {
  const res = await fetch(url, { cache: 'no-store' });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

async function load() {
  let json;
  try {
    // 직접 호출 먼저, 실패하면 프록시
    try {
      json = await fetchData(CNN_URL);
    } catch {
      json = await fetchData(PROXY);
    }

    const fg = json.fear_and_greed;
    const score = Math.round(fg.score);
    const { color, label } = getColorAndLabel(score);

    document.getElementById('content').innerHTML = `
      <div class="gauge-wrap">
        <canvas id="gauge"></canvas>
        <div class="score-label">
          <div class="score-num" style="color:${color}">${score}</div>
          <div class="score-tag" style="color:${color}">${label}</div>
        </div>
      </div>
    `;

    drawGauge(score, color);
  } catch(e) {
    document.getElementById('content').innerHTML =
      `<div class="error-msg">⚠️ Failed to load</div>`;
  }
}

load();
</script>
</body>
</html>
